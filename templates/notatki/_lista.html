{% if notatki %}
<ul class="list-group list-group-flush">
  {% for n in notatki %}
  <li class="list-group-item d-flex justify-content-between align-items-start gap-2">
    <div class="flex-grow-1" style="min-width:0">
      <div style="white-space:pre-wrap; word-break:break-word">{{ n.tresc }}</div>
      <div class="text-muted small mt-1">
        {{ n.created_at|date:"d.m.Y H:i" }}{% if n.autor %} — {{ n.autor.get_full_name|default:n.autor.username }}{% endif %}
      </div>
    </div>
    <button type="button" class="btn btn-sm btn-outline-danger flex-shrink-0" data-usun-notatka="{{ n.pk }}" title="Usuń notatkę">
      <i class="bi bi-trash3"></i>
    </button>
  </li>
  {% endfor %}
</ul>
{% else %}
<div class="text-center text-muted py-5">
  <i class="bi bi-journal-text fs-1 d-block mb-2"></i>
  Brak notatek.<br><small>Dodaj pierwszą sugestię powyżej.</small>
</div>
{% endif %}
