<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logowanie – System Magazynowy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #212529; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { min-width: 360px; }
  </style>
</head>
<body>
<div class="login-card card shadow-lg border-0">
  <div class="card-body p-5">
    <div class="text-center mb-4">
      <span style="font-size: 3rem;">&#9632;</span>
      <h4 class="mt-2 fw-bold">System Magazynowy</h4>
      <p class="text-muted small">Zarządzanie rekrutacją do magazynu</p>
    </div>
    {% if form.non_field_errors %}
    <div class="alert alert-danger">{{ form.non_field_errors }}</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Login</label>
        <input type="text" name="username" class="form-control form-control-lg" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Hasło</label>
        <input type="password" name="password" class="form-control form-control-lg" required>
      </div>
      <button type="submit" class="btn btn-dark btn-lg w-100">Zaloguj się</button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
